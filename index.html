<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, 'Helvetica Neue', sans-serif; background: #0C0520; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
  .glow { position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(123,97,255,0.2) 0%, rgba(255,45,120,0.08) 40%, transparent 70%); pointer-events: none; }
  .vinyl { width: 140px; height: 140px; border-radius: 50%; background: conic-gradient(from 0deg, #1a1a2e, #2a2a4e, #1a1a2e, #2a2a4e, #1a1a2e, #2a2a4e); position: relative; margin: 0 auto 32px; animation: spin 1.818s linear infinite; box-shadow: 0 0 40px rgba(123,97,255,0.25); }
  .vinyl::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #FF2D78, #7B61FF); }
  .vinyl::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 8px; height: 8px; border-radius: 50%; background: #0C0520; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  h1 { font-size: 42px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
  h1 span { background: linear-gradient(135deg, #FF2D78, #7B61FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { color: #B8A9D4; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
  .tagline { color: #B8A9D4; font-size: 18px; max-width: 400px; line-height: 1.6; margin-bottom: 40px; }
  .badge { display: inline-block; }
  .badge img { height: 54px; }
  .links { margin-top: 60px; font-size: 13px; color: #7B6A9E; }
  .links a { color: #7B61FF; text-decoration: none; margin: 0 12px; }
  .links a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="vinyl"></div>
<h1><span>SONGSTER</span></h1>
<div class="sub">Music Quiz</div>
<p class="tagline">Listen to songs. Place them in chronological order. Challenge your friends. How well do you really know music?</p>
<a class="badge" href="https://apps.apple.com/se/app/songster-music-quiz/id6760907389?l=en-GB">

</a>
