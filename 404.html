<head>

<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta property="og:title" content="🎵 Can you beat my score in Songster?">
<meta property="og:description" content="I challenged you to a music quiz! Listen to 10 songs and place them in the right order. Download Songster and prove you know music!">
<meta property="og:image" content="https://songster.live/og-challenge.png">

<meta name="twitter:image" content="https://songster.live/og-challenge.png">
<meta name="theme-color" content="#0C0520">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #0C0520; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
  .glow { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,45,120,0.15) 0%, transparent 60%); pointer-events: none; }
  .emoji { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  h1 span { background: linear-gradient(135deg, #FF2D78, #7B61FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .challenger { color: #B8A9D4; font-size: 16px; margin-bottom: 24px; }
  .score-box { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px 40px; margin-bottom: 32px; }
  .score-label { color: #7B6A9E; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
  .score-value { font-size: 48px; font-weight: 800; color: #FFD700; }
  .btn { display: inline-block; padding: 16px 40px; border-radius: 999px; background: linear-gradient(135deg, #FF2D78, #7B61FF); color: #fff; font-size: 18px; font-weight: 700; text-decoration: none; letter-spacing: 1px; box-shadow: 0 8px 32px rgba(255,45,120,0.3); margin-bottom: 16px; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,45,120,0.4); }
  .btn-secondary { display: inline-block; padding: 12px 28px; border-radius: 999px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #B8A9D4; font-size: 14px; font-weight: 600; text-decoration: none; }
  .footer { margin-top: 48px; font-size: 13px; color: #7B6A9E; }
  .footer a { color: #7B61FF; text-decoration: none; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="emoji">🎵</div>
<h1>You've Been <span>Challenged!</span></h1>
<p class="challenger" id="challenger-text">Someone challenged you to a music quiz</p>

<div class="score-box">
  <div class="score-label">Their Score</div>
  <div class="score-value" id="challenger-score">???</div>
</div>

<a class="btn" id="open-btn" href="#">ACCEPT CHALLENGE</a><br>
<a class="btn-secondary" href="https://apps.apple.com/se/app/songster-music-quiz/id6760907389?l=en-GB">Get Songster on the App Store</a>

<div class="footer">
  <a href="/">songster.live</a> · <a href="/privacy">Privacy</a>
</div>

<script>
// Parse challenge token from URL — supports both v1 (keyed JSON) and v2 (compact array)
(function() {
    var path = window.location.pathname;
    var match = path.match(/\/challenge\/(.+)/);
    if (!match) return;

    var token = match[1];

    try {
        // URL-safe base64 decode
        var base64 = token.replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) base64 += '=';
        var json = JSON.parse(atob(base64));

        var challengerName = null;
        var challengerScore = null;

        if (Array.isArray(json) && json[0] === 2 && json.length >= 4) {
            // v2 compact array: [2, score, name, timestamp, ...songIds]
            challengerScore = json[1];
            challengerName = json[2];
        } else if (typeof json === 'object' && json !== null) {
            // v1 keyed JSON: { version, songIds, challengerName, challengerScore, createdAt }
            challengerName = json.challengerName;
            challengerScore = json.challengerScore;
        }

        if (challengerName) {
            document.getElementById('challenger-text').textContent =
                challengerName + ' challenged you to a music quiz!';
        }
        if (challengerScore !== null && challengerScore !== undefined) {
            document.getElementById('challenger-score').textContent = challengerScore;
        }
    } catch(e) {
        // Token couldn't be decoded — leave defaults
    }

    // Deep link: the universal link will open the app if installed,
    // otherwise Safari stays on this page
    document.getElementById('open-btn').href = window.location.href;
})();
</script>
</body>
</html>
